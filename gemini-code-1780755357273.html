<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Undangan Spesial Untukmu ✨</title>
  <style>
    /* --- VARIABEL WARNA & ANIMASI (BIRU & UNGU PASTEL) --- */
    :root {
      --background-color-1: #e0e7ff; /* Biru Indigo lembut */
      --background-color-2: #f3e8ff; /* Ungu lembut */
      --button-color: #6366f1;       /* Indigo cerah */
      --button-hover: #4f46e5;       /* Indigo gelap saat di-hover */
      --text-color: #4338ca;         /* Warna teks utama */
      --accent-purple: #a855f7;      /* Ungu aksen */
      --bounce-speed: 0.6s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, var(--background-color-1), var(--background-color-2));
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }

    /* --- KOTAK KONTEN UTAMA (GLASSMORPHISM) --- */
    .container {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 2.5rem;
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(99, 102, 241, 0.15);
      text-align: center;
      width: 90%;
      max-width: 450px;
      z-index: 10;
      border: 1px solid rgba(255, 255, 255, 0.6);
      transition: all 0.5s ease;
    }

    /* Foto Kucing Utama - Sekarang menggunakan file lokal */
    #mainPhoto {
      width: 200px;
      height: 200px;
      border-radius: 20px;
      object-fit: cover;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }

    h1 {
      color: var(--text-color);
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .subtitle {
      color: #64748b;
      font-size: 1rem;
      margin-bottom: 25px;
    }

    /* --- TOMBOL UTAMA (YES/NO) --- */
    .buttons {
      display: flex;
      gap: 15px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      min-height: 80px;
    }

    .cute-btn {
      background: var(--button-color);
      border: none;
      padding: 12px 28px;
      border-radius: 50px;
      color: white;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s;
      box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
    }

    .cute-btn:hover {
      transform: scale(1.05);
      background: var(--button-hover);
    }

    #noBtn {
      background: #ffffff;
      color: #64748b;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
    }
    
    #noBtn:hover {
      background: #f1f5f9;
    }

    /* --- LAYOUT PILIHAN TEMPAT (ROW LIST) --- */
    #placeSelection {
      display: none; /* Sembunyi di awal */
      flex-direction: column;
      gap: 15px;
      margin-top: 5px;
      width: 100%;
    }

    .placeCard {
      background: white;
      border: 2px solid #e0e7ff;
      border-radius: 16px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 20px;
      text-align: left;
    }

    .placeCard:hover {
      transform: translateY(-3px);
      border-color: var(--accent-purple);
      box-shadow: 0 10px 20px rgba(168, 85, 247, 0.15);
    }

    .placeCard img {
      width: 80px;
      height: 65px;
      border-radius: 10px;
      object-fit: cover;
      background-color: #f1f5f9;
    }

    .placeCard p {
      margin: 0;
      font-weight: bold;
      color: var(--text-color);
      font-size: 1.05rem;
    }

    /* --- ANIMATION TEXT DI AKHIR --- */
    .celebration-text {
      font-size: 2.2rem;
      color: var(--accent-purple);
      font-weight: bold;
      margin-bottom: 15px;
      animation: bounce var(--bounce-speed) infinite alternate;
    }

    @keyframes bounce {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }
  </style>
</head>
<body>

  <div class="container">
    <img id="mainPhoto" src="kucing_bunga.png" alt="Kucing Imut Bawa Bunga">
    
    <h1 id="question">Maukah kamu jalan sama aku?</h1>
    <p id="subtitle" class="subtitle">Aku punya rencana seru hari ini...</p>
    
    <div class="buttons" id="initialButtons">
      <button id="yesBtn" class="cute-btn" onclick="accept()">Mau! ❤️</button>
      <button id="noBtn" class="cute-btn" onclick="decline()">Enggak</button>
    </div>

    <div id="placeSelection">
      <div class="placeCard" onclick="choosePlace('AEON Mall Tanjung Barat 🛍️')">
        <img src="aeon.jpg" alt="AEON Mall">
        <p>AEON Mall<br>Tanjung Barat</p>
      </div>

      <div class="placeCard" onclick="choosePlace('Makan Kebab 🌯')">
        <img src="kebab.jpg" alt="Kebab">
        <p>Makan Kebab</p>
      </div>

      <div class="placeCard" onclick="choosePlace('Saran')">
        <img src="saran.png" alt="Ada saran?">
        <p>Ada saran lain?</p>
      </div>
    </div>
  </div>

  <script>
    // --- LOGIKA TOMBOL MEKANIK INTERAKTIF ---
    const noTexts = [
      "Enggak", "Yakin nih?", "Coba pikir lagi...", 
      "Beneran gamau?", "Nanti nyesel lho...", "Tega banget 🥺"
    ];
    let noCount = 0;
    let yesScale = 1;

    function decline() {
      noCount++;
      const noBtn = document.getElementById("noBtn");
      const yesBtn = document.getElementById("yesBtn");
      
      // Mengubah teks tombol No secara berkala
      noBtn.innerText = noTexts[Math.min(noCount, noTexts.length - 1)];
      
      // Memperbesar tombol Yes menggunakan CSS Transform Scale (Lebih smooth)
      yesScale += 0.45;
      yesBtn.style.transform = `scale(${yesScale})`;
      
      // Efek getar kecil pada tombol No saat diklik
      noBtn.style.transform = 'translateX(8px)';
      setTimeout(() => noBtn.style.transform = 'translateX(0)', 100);
    }

    function accept() {
      // Setel ulang transform tombol Yes agar tidak merusak layout slide berikutnya
      document.getElementById("yesBtn").style.transform = "scale(1)";
      
      // Ganti properti teks ke tahap 2
      document.getElementById("question").innerText = "Yeayyy! Mau ke mana nih?";
      document.getElementById("subtitle").innerText = "Pilih salah satu tempat di bawah ini ya! 🥰";
      
      // Tukar transisi elemen
      document.getElementById("initialButtons").style.display = "none";
      document.getElementById("placeSelection").style.display = "flex";
    }

    function choosePlace(tempat) {
      // Ubah judul menjadi style teks memantul (bounce)
      const questionEl = document.getElementById("question");
      questionEl.className = "celebration-text";
      questionEl.innerText = "Oke Deal! 🚀";
      
      const subtitleEl = document.getElementById("subtitle");
      if(tempat === 'Saran') {
        subtitleEl.innerText = "Kabari aku lewat chat ya kamu maunya ke mana. Sampai ketemu! ✨";
      } else {
        subtitleEl.innerText = `Kita jalan ke ${tempat} ya! Nanti aku jemput! ✨`;
      }
      
      // Bersihkan list kartu dari layar
      document.getElementById("placeSelection").style.display = "none";
    }
  </script>

</body>
</html>
