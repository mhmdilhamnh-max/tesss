<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untuk abi pacar ilam 💐</title>
  <style>
    /* --- VARIABEL WARNA & ANIMASI --- */
    :root {
      --background-color-1: #e0e7ff; 
      --background-color-2: #f3e8ff; 
      --button-color: #6366f1;       
      --button-hover: #4f46e5;       
      --text-color: #4338ca;         
      --accent-purple: #a855f7;      
      --bounce-speed: 0.6s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, var(--background-color-1), var(--background-color-2));
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }

    .container {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 2.5rem;
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(99, 102, 241, 0.15);
      text-align: center;
      width: 90%;
      max-width: 450px;
      z-index: 10;
      border: 1px solid rgba(255, 255, 255, 0.6);
      transition: all 0.5s ease;
      
      /* --- TAMBAHAN BARU BISA SCROLL --- */
      max-height: 90vh; /* Membatasi tinggi kotak maksimal 90% dari layar HP */
      overflow-y: auto; /* Mengaktifkan scroll vertikal jika konten kepanjangan */
      
      /* Sembunyikan garis scrollbar biar tetap estetik */
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }

    /* Sembunyikan garis scrollbar untuk Chrome/Safari */
    .container::-webkit-scrollbar {
      display: none;
    }

    #mainPhoto {
      width: 200px;
      height: 200px;
      border-radius: 20px;
      object-fit: cover;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }

    h1 {
      color: var(--text-color);
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .subtitle {
      color: #64748b;
      font-size: 1rem;
      margin-bottom: 25px;
    }

    .buttons {
      display: flex;
      gap: 15px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      min-height: 80px;
    }

    .cute-btn {
      background: var(--button-color);
      border: none;
      padding: 12px 28px;
      border-radius: 50px;
      color: white;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s;
      box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
      text-decoration: none;
      display: inline-block;
    }

    .cute-btn:hover {
      transform: scale(1.05);
      background: var(--button-hover);
    }

    #noBtn {
      background: #ffffff;
      color: #64748b;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
    }
    
    #noBtn:hover {
      background: #f1f5f9;
    }

    #placeSelection {
      display: none; 
      flex-direction: column;
      gap: 15px;
      margin-top: 5px;
      width: 100%;
    }

    .placeCard {
      background: white;
      border: 2px solid #e0e7ff;
      border-radius: 16px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 20px;
      text-align: left;
    }

    .placeCard:hover {
      transform: translateY(-3px);
      border-color: var(--accent-purple);
      box-shadow: 0 10px 20px rgba(168, 85, 247, 0.15);
    }

    .placeCard img {
      width: 80px;
      height: 65px;
      border-radius: 10px;
      object-fit: cover;
      background-color: #f1f5f9;
    }

    .placeCard p {
      margin: 0;
      font-weight: bold;
      color: var(--text-color);
      font-size: 1.05rem;
    }

    /* --- FORM INPUT SARAN --- */
    #saranInput {
      display: none;
      flex-direction: column;
      gap: 15px;
      margin-top: 10px;
    }

    #saranText {
      padding: 15px;
      border-radius: 12px;
      border: 2px solid var(--background-color-1);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      text-align: center;
    }

    #saranText:focus {
      border-color: var(--accent-purple);
    }

    .celebration-text {
      font-size: 2.2rem;
      color: var(--accent-purple);
      font-weight: bold;
      margin-bottom: 15px;
      animation: bounce var(--bounce-speed) infinite alternate;
    }

    @keyframes bounce {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }
  </style>
</head>
<body>

  <div class="container">
    <img id="mainPhoto" src="kucing_bunga.jpg" alt="Kucing Imut Bawa Bunga">
    
    <h1 id="question">abi mau tak afteroffice date sama ilam?</h1>
    <p id="subtitle" class="subtitle"></p>
    
    <div class="buttons" id="initialButtons">
      <button id="yesBtn" class="cute-btn" onclick="accept()">Mauu!!</button>
      <button id="noBtn" class="cute-btn" onclick="decline()">Takk mau</button>
    </div>

    <div id="placeSelection">
      <div class="placeCard" onclick="finishDate('AEON Mall Tanjung Barat')">
        <img src="aeon.jpg" alt="AEON Mall">
        <p>AEON Mall<br>Tanjung Barat</p>
      </div>

      <div class="placeCard" onclick="finishDate('Makan Kebab 🌯')">
        <img src="kebab.jpg" alt="Kebab">
        <p>Mam Kebab</p>
      </div>

      <div class="placeCard" onclick="showInputSaran()">
        <img src="saran.png" alt="Ada saran?">
        <p>Abi ada saran tak?</p>
      </div>
    </div>

    <div id="saranInput">
      <input type="text" id="saranText" placeholder="Tulis maunya kemanaa...">
      <button class="cute-btn" onclick="submitSaran()">Kirim ke ilam!</button>
    </div>

  </div>

  <script>
    // --- GANTI DENGAN NOMOR WA KAMU (ILAM) ---
    // Pastikan pakai format 628 tanpa tanda plus (+) atau angka 0 di depan
    const nomorWA = "6285137081105"; 

    const noTexts = [
      "Takk", "Yakin nii?", "Coba abi pikir2 lagii", 
      "Bener tak mau?", "Nanti abi menyesalll", "Masaa tak mauu"
    ];
    let noCount = 0;
    let yesScale = 1;

    function decline() {
      noCount++;
      const noBtn = document.getElementById("noBtn");
      const yesBtn = document.getElementById("yesBtn");
      
      noBtn.innerText = noTexts[Math.min(noCount, noTexts.length - 1)];
      yesScale += 0.45;
      yesBtn.style.transform = `scale(${yesScale})`;
      noBtn.style.transform = 'translateX(8px)';
      setTimeout(() => noBtn.style.transform = 'translateX(0)', 100);
    }

    function accept() {
      document.getElementById("yesBtn").style.transform = "scale(1)";
      document.getElementById("question").innerText = "Yeayyy! Mau ke mana kitaa?";
      document.getElementById("subtitle").innerText = "Abi pilih salah satu di bawah ini yaaa";
      document.getElementById("initialButtons").style.display = "none";
      document.getElementById("placeSelection").style.display = "flex";
    }

    function showInputSaran() {
      // Sembunyikan list kartu, tampilkan form input
      document.getElementById("placeSelection").style.display = "none";
      document.getElementById("saranInput").style.display = "flex";
      document.getElementById("subtitle").innerText = "Wah mau kemana tuu? abii ketik di bawah yaa";
    }

    function submitSaran() {
      const tempatKetik = document.getElementById("saranText").value;
      if (tempatKetik.trim() === "") {
        alert("Isi dulu dong abii maunya kemanaaa");
        return;
      }
      finishDate(tempatKetik);
    }

    function finishDate(tempat) {
      const questionEl = document.getElementById("question");
      questionEl.className = "celebration-text";
      questionEl.innerText = "Oke ACC!";
      
      const subtitleEl = document.getElementById("subtitle");
      subtitleEl.innerText = `Kita date ke ${tempat} ya! Nanti ilam jemput abii di nestle`;
      
      document.getElementById("placeSelection").style.display = "none";
      document.getElementById("saranInput").style.display = "none";

      // Buat pesan otomatis ke WhatsApp
      const pesanWA = `Ilamm! Abi maunya kita afteroffice date ke ${tempat} nihh! Jemput di nestle yaaa 💐`;
      const linkWA = `https://wa.me/${nomorWA}?text=${encodeURIComponent(pesanWA)}`;

      // Ganti isi bawah dengan tombol untuk kirim WA
      const btnWA = document.createElement("a");
      btnWA.href = linkWA;
      btnWA.className = "cute-btn";
      btnWA.style.marginTop = "20px";
      btnWA.innerText = "Kabarin Ilam di wa";
      
      // Tambahkan tombol WA ke dalam container
      document.querySelector(".container").appendChild(btnWA);
    }
  </script>

</body>
</html>
